<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulša | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #050a13;
            --bg-card: #0d192b;
            --accent: #64ffda;
            --text-main: #a8b2d1;
            --text-white: #e6f1ff;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        section { padding: 60px 20px; max-width: 1200px; margin: 0 auto; }
        
        .section-header { text-align: center; margin-bottom: 40px; }
        .section-header h2 { font-size: 2.2rem; color: var(--text-white); text-transform: uppercase; margin: 0; }
        .line { width: 50px; height: 4px; background: var(--accent); margin: 15px auto; }

        .client-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .client-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px 20px;
            border: 1px solid rgba(100, 255, 218, 0.1);
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
        }

        .client-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .client-pfp-wrap {
            width: 100px; height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            padding: 3px;
            background: linear-gradient(45deg, var(--accent), #0072ff);
        }

        .client-pfp-wrap img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-card);
        }

        .client-card h3 { color: var(--text-white); margin: 10px 0; font-size: 1.4rem; }

        .stats-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; }
        
        .stat-badge {
            background: rgba(100, 255, 218, 0.1);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: bold;
            border: 1px solid rgba(100, 255, 218, 0.2);
        }

        .view-works {
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<section id="clients">
    <div class="section-header">
        <h2>Moji Klienti</h2>
        <div class="line"></div>
    </div>

    <div class="client-grid">
        <div class="client-card">
            <div class="client-pfp-wrap"><img src="IMG_1510.jpeg" alt="DrWoolf"></div>
            <h3>DrWoolf</h3>
            <div class="stats-row">
                <div class="stat-badge">1,4k+ Subs</div>
                <div class="stat-badge">8+ Projects</div>
            </div>
            <div class="view-works">Zobraziť prácu</div>
        </div>

        <div class="client-card">
            <div class="client-pfp-wrap"><img src="IMG_1511.jpeg" alt="Adameantius"></div>
            <h3>Adameantius</h3>
            <div class="stats-row">
                <div class="stat-badge">1,7k+ Subs</div>
                <div class="stat-badge">12+ Projects</div>
            </div>
            <div class="view-works">Zobraziť prácu</div>
        </div>

        <div class="client-card" style="border-color: var(--accent);">
            <div class="client-pfp-wrap"><img src="IMG_0937.jpeg" alt="Gulša"></div>
            <h3>Gulša</h3>
            <div class="stats-row">
                <div class="stat-badge">3k+ Subs</div>
                <div class="stat-badge">15+ Projects</div>
            </div>
            <div class="view-works">MOJE PORTFÓLIO</div>
        </div>

        <div class="client-card">
            <div class="client-pfp-wrap"><img src="IMG_1512.jpeg" alt="Pandak"></div>
            <h3>Pandak</h3>
            <div class="stats-row">
                <div class="stat-badge">6k+ Subs</div>
                <div class="stat-badge">20+ Projects</div>
            </div>
            <div class="view-works">Zobraziť prácu</div>
        </div>

        <div class="client-card">
            <div class="client-pfp-wrap"><img src="IMG_1509.jpeg" alt="AJHTtv"></div>
            <h3>AJHTtv</h3>
            <div class="stats-row">
                <div class="stat-badge">6k+ Subs</div>
                <div class="stat-badge">10+ Projects</div>
            </div>
            <div class="view-works">Zobraziť prácu</div>
        </div>
    </div>
</section>

</body>
</html>
